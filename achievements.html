<!DOCTYPE html>
<html lang="zh">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>龙高 · 成就殿堂</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            width: 100vw;
            min-height: 100vh;
            background: linear-gradient(135deg, #0a0f1e 0%, #0d1530 100%);
            font-family: 'Segoe UI', 'Microsoft YaHei', sans-serif;
            color: white;
            overflow-x: hidden;
            position: relative;
        }

        #starfield {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            z-index: 1;
            pointer-events: none;
        }

        .container {
            position: relative;
            z-index: 10;
            max-width: 900px;
            margin: 0 auto;
            padding: 20px;
            min-height: 100vh;
        }

        .header {
            text-align: center;
            padding: 30px 0 20px;
        }

        .header h1 {
            font-size: 2.8rem;
            font-weight: 700;
            letter-spacing: 8px;
            background: linear-gradient(135deg, #ffd966, #ffb3b3);
            -webkit-background-clip: text;
            background-clip: text;
            color: transparent;
            margin-bottom: 10px;
        }

        .header p {
            color: #a0b8d8;
            font-size: 1rem;
        }

        .stats-summary {
            background: rgba(15, 30, 55, 0.7);
            backdrop-filter: blur(12px);
            border: 1px solid rgba(180, 210, 255, 0.2);
            border-radius: 20px;
            padding: 20px;
            margin-bottom: 30px;
            display: flex;
            justify-content: space-around;
            text-align: center;
        }

        .stat-item {
            flex: 1;
        }

        .stat-number {
            font-size: 2.5rem;
            font-weight: 700;
            color: #ffd966;
        }

        .stat-label {
            font-size: 0.9rem;
            color: #8aa0c0;
            margin-top: 5px;
        }

        .achievements-grid {
            display: flex;
            flex-direction: column;
            gap: 12px;
        }

        .achievement-card {
            background: rgba(15, 30, 55, 0.7);
            backdrop-filter: blur(12px);
            border: 2px solid rgba(180, 210, 255, 0.2);
            border-radius: 16px;
            padding: 20px 25px;
            display: flex;
            align-items: center;
            gap: 20px;
            transition: all 0.25s;
        }

        .achievement-card.unlocked {
            border-color: #ffd966;
            background: rgba(30, 50, 80, 0.8);
            box-shadow: 0 0 20px rgba(255, 215, 100, 0.2);
        }

        .achievement-card.locked {
            opacity: 0.5;
            filter: grayscale(0.5);
        }

        .achievement-icon {
            width: 60px;
            height: 60px;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 30px;
            background: rgba(0, 0, 0, 0.3);
            border: 2px solid rgba(255, 255, 255, 0.2);
            flex-shrink: 0;
        }

        .achievement-card.unlocked .achievement-icon {
            background: linear-gradient(135deg, #daa520, #ffd966);
            border-color: #ffd966;
        }

        .achievement-card.locked .achievement-icon {
            background: rgba(50, 50, 70, 0.5);
            border-color: rgba(150, 150, 170, 0.3);
        }

        .achievement-info {
            flex: 1;
        }

        .achievement-name {
            font-size: 1.3rem;
            font-weight: 600;
            margin-bottom: 5px;
            display: flex;
            align-items: center;
            gap: 10px;
        }

        .achievement-card.unlocked .achievement-name {
            color: #ffd966;
        }

        .achievement-card.locked .achievement-name {
            color: #a0a0b0;
        }

        .achievement-desc {
            font-size: 0.9rem;
            color: #b0c8e8;
        }

        .achievement-status {
            font-size: 0.8rem;
            padding: 4px 12px;
            border-radius: 20px;
            background: rgba(0, 0, 0, 0.3);
        }

        .achievement-card.unlocked .achievement-status {
            color: #90EE90;
            border: 1px solid rgba(144, 238, 144, 0.3);
        }

        .achievement-card.locked .achievement-status {
            color: #a0a0a0;
        }

        .back-btn {
            position: fixed;
            top: 20px;
            left: 20px;
            z-index: 20;
            padding: 10px 20px;
            background: rgba(20, 40, 70, 0.5);
            backdrop-filter: blur(10px);
            border: 1px solid rgba(180, 210, 255, 0.2);
            border-radius: 40px;
            color: #c0d8ff;
            cursor: pointer;
            font-size: 0.9rem;
            transition: all 0.2s;
            text-decoration: none;
        }

        .back-btn:hover {
            background: rgba(60, 100, 160, 0.5);
        }

        .footer {
            text-align: center;
            padding: 30px 0;
            color: #6a8ab0;
            font-size: 0.85rem;
        }

        .reset-btn {
            background: rgba(100, 50, 50, 0.3);
            border: 1px solid rgba(255, 100, 100, 0.3);
            color: #ffaaaa;
            padding: 8px 20px;
            border-radius: 30px;
            cursor: pointer;
            font-size: 0.8rem;
            margin-top: 20px;
            transition: all 0.2s;
        }

        .reset-btn:hover {
            background: rgba(150, 50, 50, 0.5);
        }
    </style>
</head>
<body>

    <canvas id="starfield"></canvas>

    <a href="index.html" class="back-btn">← 返回首页</a>

    <div class="container">
        <div class="header">
            <h1>🏆 成就殿堂</h1>
            <p>记录你在龙高的每一个荣耀时刻</p>
        </div>

        <div class="stats-summary">
            <div class="stat-item">
                <div class="stat-number" id="unlockedCount">0</div>
                <div class="stat-label">已解锁成就</div>
            </div>
            <div class="stat-item">
                <div class="stat-number" id="totalCount">0</div>
                <div class="stat-label">总成就数</div>
            </div>
            <div class="stat-item">
                <div class="stat-number" id="completionRate">0%</div>
                <div class="stat-label">完成度</div>
            </div>
        </div>

        <div class="achievements-grid" id="achievementsGrid"></div>

        <div style="text-align: center;">
            <button class="reset-btn" id="resetBtn">🗑️ 重置所有成就</button>
        </div>

        <div class="footer">
            <span>✨ 每一个成就都是一段难忘的回忆 ✨</span>
        </div>
    </div>

    <script>
        // 成就数据库（与 game.html 保持一致）
        const achievementsDatabase = [
            { id: 'a_moon_cake', name: '幸福月饼', desc: '和特别的人一起看月亮，幸福得像吃了月饼一样甜。' },
            { id: 'a_class_leader', name: '班级骨干', desc: '成功当选班干部，为班级贡献力量。' },
            { id: 'a_school_cadre', name: '校级干部', desc: '成功加入学生会，成为校级学生干部。' },
            { id: 'a_longgao_star', name: '龙高之星', desc: '荣获龙高之星称号，成为全校瞩目的明星学生。' },
            { id: 'a_study_model', name: '学习标兵', desc: '成绩优异，被评为学习标兵。' },
            { id: 'a_school_award', name: '校级奖项', desc: '获得校级表彰，这是对你优秀表现的认可。' },
            { id: 'a_love_brain', name: '恋爱脑', desc: '你经历了15次以上恋爱事件，已经彻底变成了恋爱脑。' },
            { id: 'a_three_good_student', name: '三好学生', desc: '你被评为三好学生，德智体美劳全面发展！' }
        ];

        let unlockedAchievements = [];

        // 加载永久成就
        function loadAchievements() {
            const saved = localStorage.getItem('longgao_achievements_permanent');
            if (saved) {
                unlockedAchievements = JSON.parse(saved);
            } else {
                unlockedAchievements = [];
            }
        }

        // 渲染成就列表
        function renderAchievements() {
            const grid = document.getElementById('achievementsGrid');
            const unlockedCount = unlockedAchievements.length;
            const totalCount = achievementsDatabase.length;
            const rate = totalCount > 0 ? Math.round((unlockedCount / totalCount) * 100) : 0;

            document.getElementById('unlockedCount').textContent = unlockedCount;
            document.getElementById('totalCount').textContent = totalCount;
            document.getElementById('completionRate').textContent = rate + '%';

            // 按解锁状态排序（已解锁的在前）
            const sortedAchievements = [...achievementsDatabase].sort((a, b) => {
                const aUnlocked = unlockedAchievements.includes(a.id);
                const bUnlocked = unlockedAchievements.includes(b.id);
                if (aUnlocked && !bUnlocked) return -1;
                if (!aUnlocked && bUnlocked) return 1;
                return 0;
            });

            grid.innerHTML = '';
            sortedAchievements.forEach(ach => {
                const isUnlocked = unlockedAchievements.includes(ach.id);
                const card = document.createElement('div');
                card.className = `achievement-card ${isUnlocked ? 'unlocked' : 'locked'}`;
                
                card.innerHTML = `
                    <div class="achievement-icon">
                        ${isUnlocked ? '🏆' : '🔒'}
                    </div>
                    <div class="achievement-info">
                        <div class="achievement-name">
                            ${ach.name}
                        </div>
                        <div class="achievement-desc">${ach.desc}</div>
                    </div>
                    <div class="achievement-status">
                        ${isUnlocked ? '已解锁' : '未解锁'}
                    </div>
                `;
                
                grid.appendChild(card);
            });
        }

        // 重置成就
        function resetAchievements() {
            if (confirm('确定要重置所有成就吗？此操作不可恢复！')) {
                localStorage.removeItem('longgao_achievements_permanent');
                unlockedAchievements = [];
                renderAchievements();
            }
        }

        // 星空背景
        function initStarfield() {
            const canvas = document.getElementById('starfield');
            const ctx = canvas.getContext('2d');
            let stars = [];

            function resize() {
                canvas.width = window.innerWidth;
                canvas.height = window.innerHeight;
                stars = [];
                for (let i = 0; i < 100; i++) {
                    stars.push({
                        x: Math.random() * canvas.width,
                        y: Math.random() * canvas.height,
                        r: Math.random() * 2 + 0.5,
                        b: Math.random() * 0.5 + 0.3
                    });
                }
            }

            function draw() {
                ctx.clearRect(0, 0, canvas.width, canvas.height);
                ctx.fillStyle = '#0a0f1e';
                ctx.fillRect(0, 0, canvas.width, canvas.height);

                stars.forEach(s => {
                    const twinkle = Math.sin(Date.now() * 0.002 + s.x) * 0.2 + 0.8;
                    ctx.fillStyle = `rgba(255, 240, 200, ${s.b * twinkle})`;
                    ctx.beginPath();
                    ctx.arc(s.x, s.y, s.r, 0, Math.PI * 2);
                    ctx.fill();
                });

                requestAnimationFrame(draw);
            }

            window.addEventListener('resize', resize);
            resize();
            draw();
        }

        // 初始化
        function init() {
            initStarfield();
            loadAchievements();
            renderAchievements();

            document.getElementById('resetBtn').addEventListener('click', resetAchievements);
        }

        init();
    </script>
</body>
</html>
