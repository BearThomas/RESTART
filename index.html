<!DOCTYPE html>
<html lang="zh">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>龙高 · 重开模拟器</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            width: 100vw;
            height: 100vh;
            overflow: hidden;
            background-color: #0a0f1e;
            font-family: 'Segoe UI', 'Microsoft YaHei', sans-serif;
            position: relative;
        }

        /* 星空画布 */
        #starfield {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            z-index: 1;
            display: block;
        }

        /* 主界面容器 */
        .game-container {
            position: relative;
            z-index: 10;
            width: 100vw;
            height: 100vh;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            color: white;
            text-shadow: 0 0 20px rgba(0,0,0,0.7);
            pointer-events: none;
        }

        /* 标题区域 - 简化动画，只上升 */
        .title-section {
            text-align: center;
            position: absolute;
            top: 12%;
            left: 50%;
            transform: translateX(-50%);
            opacity: 0.85;
            pointer-events: none;
            animation: simpleRise 1.2s ease-out forwards;
        }

        @keyframes simpleRise {
            0% {
                top: 45%;
                opacity: 0.3;
            }
            100% {
                top: 12%;
                opacity: 0.85;
            }
        }

        .main-title {
            font-size: 4.5rem;
            font-weight: 800;
            letter-spacing: 12px;
            background: linear-gradient(135deg, #f5e6d3 0%, #c9e4ff 80%);
            -webkit-background-clip: text;
            background-clip: text;
            color: transparent;
            filter: drop-shadow(0 0 40px rgba(100, 180, 255, 0.6));
            margin-bottom: 10px;
            white-space: nowrap;
        }

        .subtitle {
            font-size: 1.3rem;
            letter-spacing: 6px;
            color: #b8d4ff;
            opacity: 0.8;
        }

        /* 主菜单区域 */
        .main-menu {
            position: absolute;
            top: 45%;
            left: 50%;
            transform: translate(-50%, -50%);
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 20px;
            opacity: 0;
            animation: menuFadeIn 0.8s ease-out 0.8s forwards;
            pointer-events: auto;
        }

        @keyframes menuFadeIn {
            0% {
                opacity: 0;
                transform: translate(-50%, -40%);
            }
            100% {
                opacity: 1;
                transform: translate(-50%, -50%);
            }
        }

        /* 模式按钮 */
        .mode-buttons {
            display: flex;
            flex-direction: column;
            gap: 18px;
            width: 280px;
        }

        .mode-btn {
            padding: 18px 0;
            font-size: 1.5rem;
            font-weight: 600;
            letter-spacing: 6px;
            color: white;
            background: rgba(20, 40, 70, 0.5);
            backdrop-filter: blur(12px);
            border: 2px solid rgba(180, 210, 255, 0.3);
            border-radius: 60px;
            cursor: pointer;
            transition: all 0.2s ease;
            box-shadow: 0 8px 20px rgba(0, 0, 0, 0.3);
            text-shadow: 0 0 15px rgba(0,0,0,0.5);
            pointer-events: auto;
        }

        .mode-btn:hover {
            background: rgba(60, 100, 160, 0.6);
            border-color: rgba(200, 230, 255, 0.6);
            transform: scale(1.02);
            box-shadow: 0 0 30px rgba(100, 180, 255, 0.4);
        }

        /* 底部菜单容器 */
        .bottom-menu-wrapper {
            position: absolute;
            bottom: 20px;
            right: 20px;
            z-index: 30;
            pointer-events: none;
        }

        /* 菜单栏 - 向右收起成球 */
        .glass-menubar {
            position: relative;
            background: rgba(15, 25, 45, 0.6);
            backdrop-filter: blur(20px);
            border: 1px solid rgba(200, 220, 255, 0.25);
            border-radius: 50px;
            padding: 10px 20px;
            display: flex;
            align-items: center;
            gap: 15px;
            box-shadow: 0 4px 20px rgba(0, 0, 0, 0.4);
            pointer-events: auto;
            transition: all 0.35s cubic-bezier(0.34, 1.56, 0.64, 1);
            overflow: hidden;
            max-width: 680px;
        }

        /* 收起状态：只显示一个圆形按钮 */
        .glass-menubar.collapsed {
            padding: 0;
            gap: 0;
            border-radius: 50%;
            width: 56px;
            height: 56px;
            background: rgba(30, 50, 80, 0.7);
            border-color: rgba(180, 210, 255, 0.4);
        }

        /* 菜单按钮组 */
        .menu-buttons {
            display: flex;
            gap: 20px;
            align-items: center;
            transition: all 0.3s ease;
            opacity: 1;
            white-space: nowrap;
        }

        .glass-menubar.collapsed .menu-buttons {
            opacity: 0;
            width: 0;
            gap: 0;
            pointer-events: none;
        }

        .menu-item {
            color: #d0e2ff;
            font-size: 1rem;
            font-weight: 500;
            letter-spacing: 2px;
            padding: 8px 14px;
            border-radius: 40px;
            cursor: pointer;
            transition: all 0.2s ease;
            background: transparent;
            border: none;
            text-shadow: 0 0 10px rgba(0,0,0,0.5);
        }

        .menu-item:hover {
            background: rgba(100, 160, 240, 0.25);
            color: #ffffff;
            transform: translateY(-2px);
        }

        /* 切换按钮 - 在收起状态下居中显示 */
        .toggle-bar-btn {
            width: 40px;
            height: 40px;
            border-radius: 50%;
            background: rgba(60, 100, 180, 0.4);
            border: 1.5px solid rgba(200, 220, 255, 0.4);
            color: #c0d8ff;
            font-size: 18px;
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
            transition: all 0.25s ease;
            backdrop-filter: blur(5px);
            flex-shrink: 0;
        }

        .glass-menubar.collapsed .toggle-bar-btn {
            width: 56px;
            height: 56px;
            margin: 0;
            background: transparent;
            border: none;
            font-size: 24px;
        }

        .toggle-bar-btn:hover {
            background: rgba(100, 160, 240, 0.6);
            border-color: rgba(220, 240, 255, 0.7);
            transform: scale(1.05);
        }

        .glass-menubar.collapsed .toggle-bar-btn:hover {
            transform: scale(1);
            background: rgba(100, 160, 240, 0.3);
        }

        /* 页脚装饰 */
        .footer-credit {
            position: absolute;
            bottom: 25px;
            left: 20px;
            color: #7f9fbf;
            font-size: 0.8rem;
            opacity: 0.4;
            z-index: 15;
            pointer-events: none;
        }

        /* 响应式 */
        @media (max-width: 600px) {
            .main-title {
                font-size: 2.8rem;
                letter-spacing: 6px;
            }
            .subtitle {
                font-size: 1rem;
            }
            .mode-btn {
                padding: 14px 0;
                font-size: 1.3rem;
                width: 240px;
            }
            .menu-buttons {
                gap: 8px;
            }
            .menu-item {
                font-size: 0.85rem;
                padding: 6px 10px;
            }
        }

        @media (max-width: 680px) {
            .glass-menubar {
                padding: 8px 12px;
            }
            .menu-item {
                font-size: 0.75rem;
                padding: 5px 8px;
                letter-spacing: 1px;
            }
        }
    </style>
</head>
<body>

    <canvas id="starfield"></canvas>

    <div class="game-container">
        <div class="title-section">
            <div class="main-title">龙高·重开</div>
            <div class="subtitle">LONG GAO SIMULATOR</div>
        </div>

        <div class="main-menu">
            <div class="mode-buttons">
                <button class="mode-btn" id="classicMode">经典模式</button>
                <button class="mode-btn" id="celebrityMode">名人模式</button>
            </div>
        </div>
    </div>

    <!-- 右下角菜单 -->
    <div class="bottom-menu-wrapper">
        <div class="glass-menubar" id="glassMenubar">
            <div class="menu-buttons" id="menuButtons">
                <button class="menu-item" id="rankBtn">🏆 排行榜</button>
                <button class="menu-item" id="achievementBtn">✨ 成就</button>
                <button class="menu-item" id="settingsBtn">⚙️ 设置</button>
                <button class="menu-item" id="aboutBtn">ℹ️ 关于我的</button>
            </div>
            <div class="toggle-bar-btn" id="toggleMenuBtn">
                <span>☰</span>
            </div>
        </div>
    </div>

    <div class="footer-credit">
        <span>✦ 星辰流转 · 龙高再启 ✦</span>
    </div>

    <script>
        (function(){
            "use strict";

            // ---------- 星空绘制 (优化性能) ----------
            const canvas = document.getElementById('starfield');
            const ctx = canvas.getContext('2d');
            
            let stars = [];
            let animationFrame = null;
            
            const CONFIG = {
                STAR_COUNT: 250,
                MAX_RADIUS: 2.2,
                COLOR_VARIATION: true,
                NEBULA_OVERLAY: true
            };

            const rand = (min, max) => Math.random() * (max - min) + min;
            
            function initStars(count) {
                const w = canvas.width;
                const h = canvas.height;
                const newStars = [];
                
                for (let i = 0; i < count; i++) {
                    const baseRadius = rand(0.5, CONFIG.MAX_RADIUS);
                    
                    let hue = 0, saturation = 0, lightness = 100;
                    if (CONFIG.COLOR_VARIATION && Math.random() > 0.6) {
                        if (Math.random() < 0.7) {
                            hue = rand(190, 220);
                            saturation = rand(15, 30);
                            lightness = rand(80, 95);
                        } else {
                            hue = rand(35, 55);
                            saturation = rand(20, 40);
                            lightness = rand(80, 95);
                        }
                    }
                    
                    newStars.push({
                        x: Math.random() * w,
                        y: Math.random() * h,
                        radius: baseRadius,
                        baseBrightness: rand(0.5, 1.0),
                        twinklePhase: Math.random() * Math.PI * 2,
                        twinkleSpeed: rand(0.01, 0.03),
                        twinkleAmp: rand(0.15, 0.35),
                        hue, saturation, lightness,
                    });
                }
                return newStars;
            }

            function resizeCanvas() {
                canvas.width = window.innerWidth;
                canvas.height = window.innerHeight;
                
                const area = canvas.width * canvas.height;
                const starCount = Math.min(350, Math.max(180, Math.floor(area / 7000)));
                stars = initStars(starCount);
            }

            function draw() {
                if (canvas.width === 0 || canvas.height === 0) return;
                
                // 使用 fillRect 替代复杂的渐变，提升性能
                ctx.fillStyle = '#0a0f1e';
                ctx.fillRect(0, 0, canvas.width, canvas.height);
                
                // 简化星云效果
                if (CONFIG.NEBULA_OVERLAY) {
                    ctx.save();
                    ctx.filter = 'blur(50px)';
                    ctx.fillStyle = 'rgba(30, 50, 100, 0.08)';
                    ctx.beginPath();
                    ctx.arc(canvas.width * 0.3, canvas.height * 0.3, canvas.width * 0.3, 0, Math.PI * 2);
                    ctx.fill();
                    ctx.fillStyle = 'rgba(60, 30, 90, 0.06)';
                    ctx.beginPath();
                    ctx.arc(canvas.width * 0.7, canvas.height * 0.7, canvas.width * 0.25, 0, Math.PI * 2);
                    ctx.fill();
                    ctx.restore();
                }
                
                const time = performance.now() / 1000;
                
                for (let s of stars) {
                    // 闪烁计算
                    const twinkle = Math.sin(time * s.twinkleSpeed * 4 + s.twinklePhase);
                    const brightnessFactor = s.baseBrightness * (0.65 + twinkle * s.twinkleAmp);
                    
                    const finalRadius = s.radius * (0.7 + 0.4 * brightnessFactor);
                    
                    // 简化颜色计算
                    let fillStyle;
                    if (s.saturation === 0) {
                        const lum = Math.floor(75 + 25 * brightnessFactor);
                        fillStyle = `rgb(${lum}, ${lum}, ${lum})`;
                    } else {
                        const lightness = Math.floor(s.lightness * brightnessFactor);
                        fillStyle = `hsl(${s.hue}, ${s.saturation}%, ${lightness}%)`;
                    }
                    
                    ctx.beginPath();
                    ctx.arc(s.x, s.y, finalRadius, 0, 2 * Math.PI);
                    
                    // 简化阴影
                    ctx.shadowColor = 'rgba(180, 200, 255, 0.5)';
                    ctx.shadowBlur = finalRadius * 4;
                    
                    ctx.fillStyle = fillStyle;
                    ctx.fill();
                }
                
                ctx.shadowBlur = 0;
            }

            function animationLoop() {
                draw();
                animationFrame = requestAnimationFrame(animationLoop);
            }

            window.addEventListener('resize', () => {
                resizeCanvas();
            });
            
            resizeCanvas();
            animationLoop();

            // 页面卸载时取消动画
            window.addEventListener('beforeunload', () => {
                if (animationFrame) {
                    cancelAnimationFrame(animationFrame);
                }
            });

            // ---------- 交互功能 ----------
            
            // 菜单收起/展开（向右收成球）
            const menubar = document.getElementById('glassMenubar');
            const toggleBtn = document.getElementById('toggleMenuBtn');
            const menuButtons = document.getElementById('menuButtons');
            
            toggleBtn.addEventListener('click', (e) => {
                e.stopPropagation();
                menubar.classList.toggle('collapsed');
                // 更新图标
                const icon = toggleBtn.querySelector('span');
                if (menubar.classList.contains('collapsed')) {
                    icon.textContent = '☰';
                } else {
                    icon.textContent = '☰';
                }
            });

            // 点击菜单项时不收起菜单
            menuButtons.addEventListener('click', (e) => {
                e.stopPropagation();
            });

            // 功能提示
            function showComingSoon(feature) {
                alert(`✨ ${feature}\n功能开发中，敬请期待！`);
            }

            document.getElementById('classicMode').addEventListener('click', () => {
                window.location.href = 'talent.html';
            });
            document.getElementById('celebrityMode').addEventListener('click', () => {
                window.location.href = 'celebrity.html';
            });
            document.getElementById('rankBtn').addEventListener('click', () => showComingSoon('排行榜'));
            document.getElementById('achievementBtn').addEventListener('click', () => showComingSoon('成就'));
            document.getElementById('settingsBtn').addEventListener('click', () => showComingSoon('设置'));
            document.getElementById('aboutBtn').addEventListener('click', () => {
                alert('🏫 龙高重开模拟器 v0.2\n星辰为证 · 再启征程');
            });

            canvas.addEventListener('contextmenu', (e) => e.preventDefault());
            
        })();
    </script>
</body>
</html>
